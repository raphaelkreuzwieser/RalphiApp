<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="beer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="wine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ec4899" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect x="36" y="36" width="440" height="440" rx="110" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- HIRN oben -->
  <g filter="url(#glow)" transform="translate(256, 128)">
    <path d="M -6 -34 C -26 -42, -54 -30, -54 -8 C -68 -4, -70 18, -54 26 C -54 42, -30 48, -10 40 L -6 40 Z" fill="url(#brainGrad)"/>
    <path d="M 6 -34 C 26 -42, 54 -30, 54 -8 C 68 -4, 70 18, 54 26 C 54 42, 30 48, 10 40 L 6 40 Z" fill="url(#brainGrad)"/>
    <line x1="0" y1="-32" x2="0" y2="40" stroke="#be185d" stroke-width="3" stroke-linecap="round"/>
    <path d="M -40 -10 q 12 4 8 16" fill="none" stroke="#be185d" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -22 -22 q 10 6 4 16" fill="none" stroke="#be185d" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -36 14 q 12 2 14 14" fill="none" stroke="#be185d" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 40 -10 q -12 4 -8 16" fill="none" stroke="#be185d" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 22 -22 q -10 6 -4 16" fill="none" stroke="#be185d" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 36 14 q -12 2 -14 14" fill="none" stroke="#be185d" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- LINKS: WEINGLAS mit R (größer!) -->
  <g transform="translate(182, 296) rotate(-14)">
    <!-- Wein im Kelch (größer) -->
    <path d="M -50 -52 Q -50 12 0 16 Q 50 12 50 -52 Z" fill="url(#wine)" stroke="#ffffff" stroke-width="5"/>
    <!-- oberer Rand -->
    <ellipse cx="0" cy="-52" rx="50" ry="11" fill="#fb7185" stroke="#ffffff" stroke-width="5"/>
    <!-- Stiel -->
    <rect x="-4.5" y="16" width="9" height="64" rx="4.5" fill="#ffffff"/>
    <!-- Fuß -->
    <ellipse cx="0" cy="84" rx="38" ry="10" fill="#ffffff"/>
    <!-- R im Kelch (größer) -->
    <text x="0" y="-18" font-family="Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff" text-anchor="middle">R</text>
  </g>

  <!-- RECHTS: BIERGLAS mit K -->
  <g transform="translate(338, 326) rotate(12)">
    <!-- Schaum -->
    <ellipse cx="0" cy="-58" rx="42" ry="18" fill="#ffffff"/>
    <circle cx="-22" cy="-64" r="14" fill="#ffffff"/>
    <circle cx="0" cy="-70" r="16" fill="#ffffff"/>
    <circle cx="22" cy="-64" r="14" fill="#ffffff"/>
    <!-- Glas -->
    <path d="M -40 -54 L -34 70 Q -34 84 -20 84 L 20 84 Q 34 84 34 70 L 40 -54 Z" fill="url(#beer)" stroke="#ffffff" stroke-width="5"/>
    <!-- Henkel -->
    <path d="M -40 -34 Q -70 -30 -68 6 Q -66 36 -38 38" fill="none" stroke="#ffffff" stroke-width="8"/>
    <!-- K -->
    <text x="0" y="34" font-family="Arial, sans-serif" font-size="60" font-weight="800" fill="#7c2d12" text-anchor="middle">K</text>
  </g>

  <!-- Funke am Anstoß-Punkt -->
  <g transform="translate(258, 252)">
    <path d="M 0 -16 L 4 -4 L 16 0 L 4 4 L 0 16 L -4 4 L -16 0 L -4 -4 Z" fill="#fef08a"/>
  </g>
</svg>
