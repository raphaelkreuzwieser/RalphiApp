<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#e07a47">
    <title>RalphiApp</title>
    <link rel="icon" type="image/svg+xml" href="ralphiapp-logo.svg">
    <link rel="apple-touch-icon" href="ralphiapp-logo.png">
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #e07a47;
            --secondary: #eaa94e;
            --danger: #ef4444;
            --success: #10b981;
        }
        
        html, body { width: 100%; height: 100%; overflow: hidden; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(circle at 15% 0%, rgba(224, 122, 71, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 90% 100%, rgba(234, 169, 78, 0.10) 0%, transparent 45%),
                linear-gradient(135deg, #1a1310 0%, #261a13 50%, #2b201a 100%);
            height: 100%;
            overflow: hidden;
            color: #efe3d6;
        }
        
        .container { display: flex; height: 100dvh; min-height: 100dvh; flex-direction: column; }
        
        .splash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 40%, #2b201a 0%, #1a1310 70%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999; gap: 28px;
            opacity: 1; transition: opacity 0.6s ease-out;
            overflow: hidden;
        }
        .splash.hidden { opacity: 0; pointer-events: none; }

        /* Pulsierende Ringe hinterm Logo */
        .splash-rings {
            position: absolute;
            width: 100px; height: 100px;
            display: flex; align-items: center; justify-content: center;
        }
        .splash-rings span {
            position: absolute; border-radius: 50%;
            border: 2px solid rgba(224, 122, 71, 0.4);
            animation: ring-pulse 2.5s ease-out infinite;
        }
        .splash-rings span:nth-child(1) { width: 120px; height: 120px; animation-delay: 0s; }
        .splash-rings span:nth-child(2) { width: 120px; height: 120px; animation-delay: 0.8s; }
        .splash-rings span:nth-child(3) { width: 120px; height: 120px; animation-delay: 1.6s; }
        @keyframes ring-pulse {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(2.4); opacity: 0; }
        }

        .splash-logo {
            width: 120px; height: 120px;
            border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 20px 60px rgba(224, 122, 71, 0.5);
            animation: logo-entrance 1s cubic-bezier(0.34, 1.56, 0.64, 1) both, splash-float 3s ease-in-out 1s infinite;
            position: relative; z-index: 2;
            overflow: hidden;
        }
        .splash-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 30px; display: block; }
        @keyframes logo-entrance {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes splash-float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }

        .splash-text { text-align: center; animation: text-fade-up 0.8s ease-out 0.6s both; }
        .splash-text h1 {
            font-size: 34px; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(135deg, #f0a866 0%, #eaa94e 50%, #fbbf24 100%);
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes text-fade-up {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .splash-text p { font-size: 14px; color: #b5a18d; margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; }

        /* Ladebalken unten */
        .splash-loader {
            position: absolute; bottom: 60px;
            width: 140px; height: 4px;
            background: rgba(196, 170, 140, 0.15);
            border-radius: 4px; overflow: hidden;
            animation: text-fade-up 0.8s ease-out 0.9s both;
        }
        .splash-loader::after {
            content: ''; display: block; height: 100%; width: 40%;
            background: linear-gradient(90deg, #e07a47, #eaa94e);
            border-radius: 4px;
            animation: loader-slide 1.5s ease-in-out infinite;
        }
        @keyframes loader-slide {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }
        
        .main-layout { display: flex; flex: 1; overflow: hidden; min-height: 0; }
        
        .sidebar {
            width: 80px;
            background: linear-gradient(180deg, rgba(224, 122, 71, 0.1) 0%, rgba(234, 169, 78, 0.05) 100%);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(196, 170, 140, 0.1);
            display: flex; flex-direction: column; align-items: center;
            padding: 16px 0; gap: 12px;
            overflow-y: auto; flex-shrink: 0;
        }
        
        .logo {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #e07a47 0%, #eaa94e 100%);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px rgba(224, 122, 71, 0.3);
            animation: float 3s ease-in-out infinite;
            cursor: pointer; overflow: hidden; flex-shrink: 0;
        }
        .logo img { width: 100%; height: 100%; object-fit: contain; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        
        .btn-sidebar {
            width: 50px; height: 50px;
            border: none; border-radius: 13px;
            background: rgba(196, 170, 140, 0.1);
            color: #efe3d6; font-size: 22px;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .btn-sidebar:hover { background: rgba(224, 122, 71, 0.2); color: #fff; }
        .btn-sidebar.active {
            background: linear-gradient(135deg, #e07a47 0%, #eaa94e 100%);
            color: white; box-shadow: 0 8px 24px rgba(224, 122, 71, 0.4);
        }
        
        .btn-whatsapp { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); color: white; }
        .btn-whatsapp:hover { background: linear-gradient(135deg, #059669 0%, #10b981 100%); color: white; }
        .btn-denkandich { background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%); color: white; }
        .btn-denkandich:hover { background: linear-gradient(135deg, #db2777 0%, #ec4899 100%); color: white; transform: scale(1.08); }
        .btn-brauchdi { background: linear-gradient(135deg, #dc2626 0%, #f87171 100%); color: white; }
        .btn-brauchdi:hover { background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%); color: white; transform: scale(1.08); }
        .btn-aufans { background: linear-gradient(135deg, #d97706 0%, #f0b35e 100%); color: white; }
        .btn-aufans:hover { background: linear-gradient(135deg, #b45309 0%, #d97706 100%); color: white; transform: scale(1.08); }
        .btn-gschichtl { background: linear-gradient(135deg, #dc2626 0%, #facc15 100%); color: #fff; }
        .btn-gschichtl:hover { background: linear-gradient(135deg, #b91c1c 0%, #eab308 100%); color: #fff; transform: scale(1.08); }
        
        .btn-emergency {
            background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            color: white;
            animation: pulse-emergency 2s infinite;
        }
        .btn-emergency:hover { background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%); color: white; }
        @keyframes pulse-emergency {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }
        
        .sidebar-spacer { margin-top: auto; }
        .sidebar-divider {
            width: 36px; height: 1px; flex-shrink: 0;
            background: rgba(196, 170, 140, 0.25);
            margin: 4px 0;
        }
        
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
        
        .header {
            background: linear-gradient(90deg, rgba(224, 122, 71, 0.05) 0%, rgba(234, 169, 78, 0.05) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(196, 170, 140, 0.1);
            padding: 18px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header h1 {
            font-size: 22px; font-weight: 800;
            background: linear-gradient(135deg, #e07a47 0%, #eaa94e 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .user-badge {
            background: rgba(224, 122, 71, 0.2);
            border: 1px solid rgba(224, 122, 71, 0.5);
            color: #f0a866; padding: 6px 12px;
            border-radius: 20px; font-size: 12px; font-weight: 600;
        }
        .btn-settings {
            width: 40px; height: 40px; border: none;
            background: rgba(196, 170, 140, 0.1); border-radius: 10px;
            color: #efe3d6; font-size: 18px; cursor: pointer; transition: all 0.3s;
        }
        .btn-settings:hover { background: rgba(224, 122, 71, 0.2); color: #f0a866; }
        .gedanke-banner {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.25) 0%, rgba(244, 114, 182, 0.15) 100%);
            border-bottom: 1px solid rgba(236, 72, 153, 0.3);
            color: #f9a8d4; padding: 12px 20px; font-size: 14px; font-weight: 600;
            text-align: center; cursor: pointer; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .gedanke-banner:hover { background: linear-gradient(135deg, rgba(236, 72, 153, 0.35) 0%, rgba(244, 114, 182, 0.2) 100%); }
        .gedanke-banner.banner-brauchdi {
            background: linear-gradient(135deg, rgba(220, 38, 38, 0.30) 0%, rgba(248, 113, 113, 0.18) 100%);
            border-bottom: 1px solid rgba(220, 38, 38, 0.4); color: #fca5a5;
        }
        .gedanke-banner.banner-aufans {
            background: linear-gradient(135deg, rgba(217, 119, 6, 0.30) 0%, rgba(240, 179, 94, 0.18) 100%);
            border-bottom: 1px solid rgba(217, 119, 6, 0.4); color: #fcd9a5; flex-wrap: wrap;
        }
        
        .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }
        .tab-content { display: none; flex: 1; overflow: hidden; min-height: 0; }
        .tab-content.active { display: flex; flex-direction: column; min-height: 0; }
        
        .chat-area {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .message { display: flex; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.own { justify-content: flex-end; }
        .message-bubble {
            max-width: 75%; padding: 12px 16px; border-radius: 18px;
            line-height: 1.4; word-wrap: break-word;
        }
        .message.own .message-bubble { background: linear-gradient(135deg, #e07a47 0%, #eaa94e 100%); color: white; }
        .message.other .message-bubble { background: rgba(196, 170, 140, 0.15); color: #efe3d6; }
        .message-sender { font-size: 11px; opacity: 0.7; margin-bottom: 3px; font-weight: 600; }
        .message-time { font-size: 11px; margin-top: 4px; opacity: 0.7; }
        
        .typing-indicator { display: flex; gap: 4px; padding: 14px 18px; background: rgba(196, 170, 140, 0.15); border-radius: 18px; width: fit-content; }
        .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: #b5a18d; animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { opacity: 0.5; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-8px); } }
        
        .chat-input {
            display: flex; gap: 12px; padding: 16px;
            background: rgba(224, 122, 71, 0.05);
            border-top: 1px solid rgba(196, 170, 140, 0.1);
        }
        .chat-input input {
            flex: 1; background: rgba(196, 170, 140, 0.1);
            border: 1px solid rgba(196, 170, 140, 0.2);
            border-radius: 12px; padding: 12px 16px;
            color: #efe3d6; font-size: 14px; outline: none;
        }
        .chat-input input:focus { background: rgba(196, 170, 140, 0.15); border-color: rgba(224, 122, 71, 0.5); }
        .chat-input button {
            width: 44px; height: 44px; border: none;
            background: linear-gradient(135deg, #e07a47 0%, #eaa94e 100%);
            border-radius: 10px; color: white; cursor: pointer; font-size: 18px;
            transition: all 0.3s; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .chat-input button:hover:not(:disabled) { transform: scale(1.05); }
        .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .locations-container, .todos-container { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .locations-input, .todos-input {
            padding: 16px; background: rgba(224, 122, 71, 0.05);
            border-bottom: 1px solid rgba(196, 170, 140, 0.1);
            display: flex; flex-direction: column; gap: 10px;
        }
        .locations-input input, .todos-input input {
            background: rgba(196, 170, 140, 0.1);
            border: 1px solid rgba(196, 170, 140, 0.2);
            border-radius: 10px; padding: 12px 16px;
            color: #efe3d6; font-size: 14px; outline: none;
        }
        .locations-input input:focus, .todos-input input:focus { background: rgba(196, 170, 140, 0.15); border-color: rgba(224, 122, 71, 0.5); }
        
        .locations-btn, .todos-btn, .gps-btn {
            background: linear-gradient(135deg, #e07a47 0%, #eaa94e 100%);
            border: none; border-radius: 10px; color: white;
            padding: 12px; cursor: pointer; font-weight: 600; transition: all 0.3s;
        }
        .gps-btn { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); }
        .locations-btn:hover, .todos-btn:hover, .gps-btn:hover { transform: translateY(-2px); }
        
        .locations-list, .todos-list { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .location-card, .todo-card {
            background: rgba(196, 170, 140, 0.1);
            border: 1px solid rgba(196, 170, 140, 0.2);
            border-radius: 14px; padding: 16px;
            display: flex; justify-content: space-between; align-items: flex-start;
            animation: slideIn 0.3s ease-out;
        }
        .todo-card { cursor: pointer; transition: all 0.3s; }
        .todo-card:hover { background: rgba(196, 170, 140, 0.15); }
        .todo-card.done { opacity: 0.6; }
        .todo-card.done .todo-text { text-decoration: line-through; color: #9c8a76; }
        
        .todo-checkbox {
            width: 24px; height: 24px; border-radius: 6px;
            background: rgba(224, 122, 71, 0.2); border: 2px solid rgba(224, 122, 71, 0.5);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            margin-right: 12px; transition: all 0.3s; flex-shrink: 0;
        }
        .todo-card.done .todo-checkbox { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); border-color: #10b981; }
        .todo-checkbox::after { content: '✓'; color: white; font-size: 14px; font-weight: bold; opacity: 0; }
        .todo-card.done .todo-checkbox::after { opacity: 1; }
        
        .todo-content, .location-info { flex: 1; }
        .todo-text, .location-name { color: #efe3d6; font-weight: 600; }
        .location-coords { font-size: 12px; color: #9c8a76; margin-top: 8px; font-family: monospace; }
        .user-info { font-size: 11px; color: #b5a18d; margin-top: 4px; }
        
        .location-delete, .todo-delete {
            background: rgba(239, 68, 68, 0.2); border: none; color: #ef4444;
            width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
            font-size: 16px; transition: all 0.3s; flex-shrink: 0;
        }
        .location-delete:hover, .todo-delete:hover { background: rgba(239, 68, 68, 0.3); }
        
        .maps-btn {
            background: linear-gradient(135deg, #eaa94e 0%, #0891b2 100%);
            border: none; color: white; padding: 8px 14px; border-radius: 8px;
            font-size: 12px; cursor: pointer; transition: all 0.3s; display: inline-block; margin-top: 8px;
        }
        .maps-btn:hover { transform: translateY(-1px); }
        .empty-state { text-align: center; padding: 40px 20px; color: #9c8a76; }
        
        /* USER SELECTOR */
        .user-selector {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.97);
            display: flex; align-items: center; justify-content: center;
            z-index: 9998; flex-direction: column; gap: 30px;
        }
        .user-selector.hidden { display: none; }
        .user-selector h2 {
            font-size: 26px;
            background: linear-gradient(135deg, #e07a47 0%, #eaa94e 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .user-buttons { display: flex; gap: 20px; flex-direction: column; }
        .user-btn {
            padding: 16px 40px; border: none; border-radius: 12px;
            font-size: 18px; font-weight: 600; cursor: pointer; transition: all 0.3s; min-width: 220px;
        }
        .user-btn.raphy { background: linear-gradient(135deg, #e07a47 0%, #eaa94e 100%); color: white; }
        .user-btn.kathi { background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%); color: white; }
        .user-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(224, 122, 71, 0.4); }

        /* LOGIN */
        .login-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.98);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; flex-direction: column; gap: 24px; padding: 20px;
        }
        .login-screen.hidden { display: none; }
        .login-logo {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #e07a47 0%, #eaa94e 100%);
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 20px 60px rgba(224, 122, 71, 0.4); overflow: hidden;
        }
        .login-logo img { width: 100%; height: 100%; object-fit: contain; }
        .login-screen h2 {
            font-size: 24px;
            background: linear-gradient(135deg, #e07a47 0%, #eaa94e 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .login-box { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; }
        .login-box input {
            background: rgba(196, 170, 140, 0.1);
            border: 1px solid rgba(196, 170, 140, 0.2);
            border-radius: 12px; padding: 14px 16px;
            color: #efe3d6; font-size: 16px; outline: none; text-align: center;
        }
        .login-box input:focus { border-color: rgba(224, 122, 71, 0.5); }
        .login-box button {
            background: linear-gradient(135deg, #e07a47 0%, #eaa94e 100%);
            border: none; border-radius: 12px; color: white;
            padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .login-box button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(224, 122, 71, 0.4); }
        .login-error { color: #ef4444; font-size: 13px; min-height: 18px; text-align: center; }
        
        /* MODALS */
        .modal {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.92);
            display: none; align-items: center; justify-content: center;
            z-index: 3000; padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, #2b201a 0%, #1a1310 100%);
            border: 1px solid rgba(196, 170, 140, 0.1);
            border-radius: 20px; padding: 30px; max-width: 420px; width: 100%;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .modal-content h2 {
            margin-bottom: 20px;
            background: linear-gradient(135deg, #e07a47 0%, #eaa94e 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .modal-content.emergency h2 { background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .settings-label { font-size: 12px; text-transform: uppercase; color: #9c8a76; margin-bottom: 8px; display: block; }
        .modal-content input {
            width: 100%; background: rgba(196, 170, 140, 0.1);
            border: 1px solid rgba(196, 170, 140, 0.2); border-radius: 10px;
            padding: 12px; color: #efe3d6; margin-bottom: 12px; outline: none;
        }
        .modal-content input:focus { border-color: rgba(224, 122, 71, 0.5); }
        .api-status { padding: 12px; border-radius: 8px; font-size: 12px; margin-bottom: 16px; text-align: center; }
        .api-status.connected { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .api-status.disconnected { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
        
        .phone-number {
            font-size: 28px; font-weight: bold; color: #efe3d6; font-family: monospace;
            margin: 24px 0; padding: 20px; background: rgba(239, 68, 68, 0.1);
            border-radius: 12px; text-align: center;
        }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; flex-direction: column; }
        .btn-primary, .btn-secondary, .btn-call {
            padding: 13px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-size: 15px;
        }
        .btn-primary { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); color: white; }
        .btn-call { background: linear-gradient(135deg, #ef4444 0%, #f87171 100%); color: white; }
        .btn-secondary { background: rgba(196, 170, 140, 0.1); color: #efe3d6; }

    <script>
        // ===== FIREBASE SETUP =====
        const firebaseConfig = {
            apiKey: "AIzaSyAH2S9U8A3fxKQEnhwduILkKWRXBCoALeM",
            authDomain: "ralphiapp.firebaseapp.com",
            databaseURL: "https://ralphiapp-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "ralphiapp",
            storageBucket: "ralphiapp.firebasestorage.app",
            messagingSenderId: "570495393814",
            appId: "1:570495393814:web:e3e3f948f078ab15755537"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ===== STATE =====
        const APP_PASSWORD = "ralphi2026"; // <-- HIER Passwort ändern
        const USE_FUNCTION = true; // Chat läuft über sichere Netlify Function
        let currentUser = localStorage.getItem('ralphiapp_user') || null;
        let loggedIn = localStorage.getItem('ralphiapp_loggedin') === 'yes';
        let apiKey = localStorage.getItem('ralphiapp_api_key') || '';
        let messages = [];
        let locations = [];
        let todos = [];
        let termine = [];
        let erinnerungen = [];
        let isSending = false;
        let syncStarted = false;

        // ===== DOM =====
        const splash = document.getElementById('splash');
        const loginScreen = document.getElementById('loginScreen');
        const loginInput = document.getElementById('loginInput');
        const loginError = document.getElementById('loginError');
        const userSelector = document.getElementById('userSelector');
        const userBadge = document.getElementById('userBadge');
        const headerTitle = document.getElementById('headerTitle');
        const chatArea = document.getElementById('chatArea');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const locationInput = document.getElementById('locationInput');
        const locationLinkInput = document.getElementById('locationLinkInput');
        const locationsList = document.getElementById('locationsList');
        const todoInput = document.getElementById('todoInput');
        const todosList = document.getElementById('todosList');
        const tabButtons = document.querySelectorAll('[data-tab]');
        const tabs = document.querySelectorAll('.tab-content');

        // ===== LOGIN =====
        function checkLogin() {
            if (loginInput.value === APP_PASSWORD) {
                loggedIn = true;
                localStorage.setItem('ralphiapp_loggedin', 'yes');
                loginScreen.classList.add('hidden');
                showAfterLogin();
            } else {
                loginError.textContent = '❌ Falsches Passwort';
                loginInput.value = '';
            }
        }
        if (loginInput) {
            loginInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkLogin(); });
        }

        function showAfterLogin() {
            // Nach Login: entweder direkt rein (User bekannt) oder User-Auswahl
            if (currentUser) {
                userSelector.classList.add('hidden');
                updateUserBadge();
                if (!syncStarted) {
                    setupFirebaseSync();
                    syncStarted = true;
                }
            } else {
                userSelector.classList.remove('hidden');
            }
        }

        // ===== FIREBASE REALTIME SYNC =====
        // Hört live auf Änderungen - egal ob von Raphy oder Kathi
        function setupFirebaseSync() {
            db.ref('messages').on('value', (snap) => {
                const val = snap.val() || {};
                messages = Object.keys(val).map(k => ({ _key: k, ...val[k] }))
                    .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                renderChat();
            });
            db.ref('locations').on('value', (snap) => {
                const val = snap.val() || {};
                locations = Object.keys(val).map(k => ({ _key: k, ...val[k] }))
                    .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                renderLocations();
            });
            db.ref('todos').on('value', (snap) => {
                const val = snap.val() || {};
                todos = Object.keys(val).map(k => ({ _key: k, ...val[k] }))
                    .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                renderTodos();
            });
            db.ref('termine').on('value', (snap) => {
                const val = snap.val() || {};
                termine = Object.keys(val).map(k => ({ _key: k, ...val[k] }))
                    .sort((a, b) => (a.when || '').localeCompare(b.when || ''));
                renderTermine();
            });
            // Live-Signale (denk an dich / i brauch di / auf ans) - Toast wenn frisch & vom Partner
            db.ref('signale').on('child_added', (snap) => {
                const s = snap.val();
                if (!s) return;
                if (s.from !== currentUser && Date.now() - (s.timestamp || 0) < 60000) {
                    const fromLabel = s.from === 'raphy' ? '🔥 Raphy' : '💜 Kathi';
                    if (s.type === 'brauchdi') showToast('🆘 ' + fromLabel + ' braucht dich grad!', 'error');
                    else if (s.type === 'aufans') showToast('🍻 ' + fromLabel + ' fragt: Auf ans - kurz?', 'success');
                    else showToast('🧠 ' + fromLabel + ' denkt an dich! 💕', 'success');
                }
            });
            // Letztes Signal - als Banner (auch wenn man's live verpasst hat)
            db.ref('letztesSignal').on('value', (snap) => {
                renderGedankeBanner(snap.val());
            });
            // Antwort auf "Auf ans" (👍/👎)
            db.ref('aufansAntwort').on('value', (snap) => {
                const a = snap.val();
                if (!a || a.to !== currentUser) return;
                if (Date.now() - (a.timestamp || 0) < 120000) {
                    const fromLabel = a.from === 'raphy' ? '🔥 Raphy' : '💜 Kathi';
                    if (a.answer === 'ja') showToast('🍻 ' + fromLabel + ' sagt JA - auf ans! 🎉', 'success');
                    else showToast('😅 ' + fromLabel + ' kann grad nicht', '');
                }
            });
            // Erinnerungen vom Partner
            db.ref('erinnerungen').on('value', (snap) => {
                const val = snap.val() || {};
                erinnerungen = Object.keys(val).map(k => ({ _key: k, ...val[k] }))
                    .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                renderErinnerungen();
            });
        }

        // ===== USER =====
        function selectUser(user) {
            currentUser = user;
            localStorage.setItem('ralphiapp_user', user);
            userSelector.classList.add('hidden');
            updateUserBadge();
            if (!syncStarted) {
                setupFirebaseSync();
                syncStarted = true;
            } else {
                // Schon synchronisiert - nur Ansicht aktualisieren (eigene/fremde Nachrichten)
                renderAll();
                // Banner neu bewerten (Gedanke vom neuen Partner?)
                db.ref('letztesSignal').once('value').then(snap => renderGedankeBanner(snap.val()));
            }
        }

        function updateUserBadge() {
            userBadge.textContent = currentUser === 'raphy' ? '🔥 Raphy' : '💜 Kathi';
        }

        // ===== INIT =====
        setTimeout(() => {
            splash.classList.add('hidden');
            if (loggedIn) {
                loginScreen.classList.add('hidden');
                showAfterLogin();
            } else {
                loginScreen.classList.remove('hidden');
            }
        }, 4000);

        function renderAll() { renderChat(); renderLocations(); renderTodos(); renderTermine(); renderErinnerungen(); }

        // ===== TABS =====
        tabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const tabName = btn.dataset.tab;
                tabButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                tabs.forEach(tab => tab.classList.remove('active'));
                document.getElementById(tabName + '-tab').classList.add('active');
                if (tabName === 'chat') { headerTitle.textContent = '💬 Chat'; setTimeout(() => chatArea.scrollTop = chatArea.scrollHeight, 0); }
                else if (tabName === 'locations') headerTitle.textContent = '📍 Standorte';
                else if (tabName === 'todos') headerTitle.textContent = '📋 Aufgaben';
                else if (tabName === 'erinnerungen') headerTitle.textContent = '🔔 Erinnerungen';
                else if (tabName === 'termine') headerTitle.textContent = '📅 Termine';
                else if (tabName === 'bier') headerTitle.textContent = '🍺 Bierkalender';
            });
        });

        function getTime() { return new Date().toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit' }); }

        // ===== TOAST (sichtbare Meldung statt alert) =====
        let toastTimer;
        function showToast(msg, type) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (type ? ' ' + type : '');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { t.className = 'toast'; }, 2800);
        }

        // ===== CHAT =====
        function renderChat() {
            chatArea.innerHTML = '';
            messages.forEach(msg => {
                const isOwn = msg.sender === currentUser;
                const div = document.createElement('div');
                div.className = 'message ' + (isOwn ? 'own' : 'other');
                let senderLabel = '';
                if (!isOwn) {
                    senderLabel = msg.sender === 'RalphiApp' ? '🤖 RalphiApp' : (msg.sender === 'raphy' ? '🔥 Raphy' : '💜 Kathi');
                }
                div.innerHTML = `
                    <div class="message-bubble">
                        ${senderLabel ? `<div class="message-sender">${senderLabel}</div>` : ''}
                        <div>${msg.text}</div>
                        <div class="message-time">${msg.time}</div>
                    </div>
                `;
                chatArea.appendChild(div);
            });
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isSending) return;

            // Nachricht in Firebase pushen (Kathi sieht sie sofort)
            db.ref('messages').push({ sender: currentUser, text, time: getTime(), timestamp: Date.now() });
            messageInput.value = '';

            isSending = true;
            sendBtn.disabled = true;

            // Typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message other';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            chatArea.appendChild(typingDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            let reply = '';
            if (!apiKey && !USE_FUNCTION) {
                await new Promise(r => setTimeout(r, 700));
                const demos = ['✅ Alles klar!', '👍 Verstanden!', '😎 Perfekt!', '🔥 Wird gemacht!', 'Jo! 👌', '💪 Läuft!'];
                reply = demos[Math.floor(Math.random()*demos.length)] + ' (Demo - API-Key in ⚙️ für echten Chat)';
            } else {
                try {
                    // Über die sichere Netlify Function (Key ist dort versteckt)
                    const response = await fetch('/.netlify/functions/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text, user: currentUser })
                    });
                    if (!response.ok) throw new Error('Status ' + response.status);
                    const data = await response.json();
                    reply = data.reply || '⚠️ Keine Antwort erhalten.';
                } catch (e) {
                    reply = '⚠️ Chat-Fehler. Läuft die Netlify Function? (CLAUDE_API_KEY hinterlegt?)';
                }
            }
            // Antwort von RalphiApp in Firebase (sehen beide)
            db.ref('messages').push({ sender: 'RalphiApp', text: reply, time: getTime(), timestamp: Date.now() });
            isSending = false;
            sendBtn.disabled = false;
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !isSending) sendMessage(); });

        // Nur den Chat leeren (Standorte & Todos bleiben)
        function clearChat() {
            if (confirm('🧹 Chat-Verlauf leeren? (Standorte & Aufgaben bleiben)')) {
                db.ref('messages').remove();
                showToast('✅ Chat geleert!', 'success');
            }
        }

        // ===== WHATSAPP & PHONE =====
        function openWhatsApp() {
            window.open('https://wa.me/436502546801?text=Hallo%20-%20i%20brauch%20deine%20Hilfe!', '_blank');
        }
        function openGschichtl() {
            window.open('https://www.dropbox.com/scl/fi/8owhyy7msmvr7d6b7s8qy/Kathis-Gschichtl-Sammlung-Mai-2026.xlsx?rlkey=e61axxq6sm0k1bdyv1yn0arrb&st=6diwouxr&dl=0', '_blank');
        }
        function showPhoneDialog() { document.getElementById('phoneModal').classList.add('active'); }
        function copyPhoneNumber() {
            navigator.clipboard.writeText('+436502546801').then(() => showToast('✅ Kopiert: +43 650 25468 01', 'success')).catch(() => showToast('+43 650 25468 01', ''));
        }

        // ===== SETTINGS =====
        function openSettings() { updateApiStatus(); document.getElementById('settingsModal').classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function updateApiStatus() {
            const s = document.getElementById('apiStatus');
            s.innerHTML = '<div class="api-status connected">✅ Chat mit Claude aktiv</div>';
        }
        function switchUser() {
            closeModal('settingsModal');
            userSelector.classList.remove('hidden');
        }
        function clearAllData() {
            if (confirm('🚨 Wirklich ALLES löschen? (Chats, Standorte, Aufgaben - auch bei Kathi!)')) {
                db.ref('messages').remove();
                db.ref('locations').remove();
                db.ref('todos').remove();
                closeModal('settingsModal');
                showToast('✅ Alles gelöscht!', 'success');
            }
        }

        // ===== GPS =====
        function getGpsLocation() {
            if (!navigator.geolocation) { showToast('⚠️ GPS nicht verfügbar', 'error'); return; }
            showToast('📡 Suche GPS...', '');
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const lat = pos.coords.latitude, lng = pos.coords.longitude;
                    locationLinkInput.value = lat.toFixed(5) + ',' + lng.toFixed(5);
                    showToast('✅ GPS gefunden! Jetzt Titel + Speichern', 'success');
                },
                (err) => showToast('⚠️ GPS Fehler - erlaube GPS im Browser!', 'error')
            );
        }

        // ===== LOCATIONS =====
        function renderLocations() {
            locationsList.innerHTML = '';
            if (locations.length === 0) { locationsList.innerHTML = '<div class="empty-state">📍 Noch keine Standorte</div>'; return; }
            locations.forEach((loc) => {
                const div = document.createElement('div');
                div.className = 'location-card';
                const userLabel = loc.user === 'raphy' ? '🔥 Raphy' : '💜 Kathi';
                const coordText = (loc.lat != null && loc.lng != null)
                    ? `${loc.lat.toFixed(4)}° N, ${loc.lng.toFixed(4)}° E`
                    : '🔗 Google Maps Link';
                const openUrl = loc.mapLink || `https://maps.google.com/?q=${loc.lat},${loc.lng}`;
                div.innerHTML = `
                    <div class="location-info">
                        <div class="location-name">📍 ${loc.name}</div>
                        <div class="location-coords">${coordText}</div>
                        <div class="user-info">von ${userLabel}</div>
                        <button class="maps-btn" onclick="window.open('${openUrl}','_blank')">🗺️ In Maps öffnen</button>
                    </div>
                    <button class="location-delete" onclick="deleteLocation('${loc._key}')">🗑️</button>
                `;
                locationsList.appendChild(div);
            });
        }

        function addLocation() {
            const name = locationInput.value.trim();
            const input = locationLinkInput.value.trim();
            if (!name) { showToast('Bitte Titel eingeben! (z.B. "Taxi")', 'error'); return; }
            if (!input) { showToast('Bitte Standort eingeben (oder 📍 Button)', 'error'); return; }

            let lat = null, lng = null, mapLink = '';
            const lower = input.toLowerCase();

            if (lower.includes('http') && (lower.includes('goo.gl') || lower.includes('google.com/maps') || lower.includes('maps.app') || lower.includes('maps.google'))) {
                mapLink = input;
                const m = input.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/) || input.match(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/) || input.match(/(-?\d+\.\d+),(-?\d+\.\d+)/);
                if (m) { lat = parseFloat(m[1]); lng = parseFloat(m[2]); }
            }
            else {
                const m = input.match(/(-?\d+\.?\d*),\s*(-?\d+\.?\d*)/);
                if (m) {
                    lat = parseFloat(m[1]); lng = parseFloat(m[2]);
                    mapLink = `https://maps.google.com/?q=${lat},${lng}`;
                } else {
                    showToast('❌ Koordinaten "48.2,14.3" oder Maps-Link', 'error');
                    return;
                }
            }

            // In Firebase speichern (Kathi sieht es sofort)
            db.ref('locations').push({ name, lat, lng, mapLink, user: currentUser, timestamp: Date.now() });
            locationInput.value = '';
            locationLinkInput.value = '';
            showToast('✅ Standort "' + name + '" gespeichert!', 'success');
        }

        function deleteLocation(key) { db.ref('locations/' + key).remove(); }
        locationInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addLocation(); });
        locationLinkInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addLocation(); });

        // ===== TODOS =====
        function renderTodos() {
            todosList.innerHTML = '';
            if (todos.length === 0) { todosList.innerHTML = '<div class="empty-state">📋 Keine Aufgaben - alles erledigt! 🎉</div>'; return; }
            todos.forEach((todo) => {
                const div = document.createElement('div');
                div.className = 'todo-card' + (todo.done ? ' done' : '');
                const userLabel = todo.user === 'raphy' ? '🔥 Raphy' : '💜 Kathi';
                div.innerHTML = `
                    <div style="display:flex;flex:1;" onclick="toggleTodo('${todo._key}', ${!todo.done})">
                        <div class="todo-checkbox"></div>
                        <div class="todo-content">
                            <div class="todo-text">${todo.text}</div>
                            <div class="user-info">von ${userLabel}</div>
                        </div>
                    </div>
                    <button class="todo-delete" onclick="deleteTodo('${todo._key}')">🗑️</button>
                `;
                todosList.appendChild(div);
            });
        }

        function addTodo() {
            const text = todoInput.value.trim();
            if (!text) { showToast('Bitte eine Aufgabe eingeben!', 'error'); return; }
            db.ref('todos').push({ text, done: false, user: currentUser, timestamp: Date.now() });
            todoInput.value = '';
        }

        function toggleTodo(key, done) { db.ref('todos/' + key + '/done').set(done); }
        function deleteTodo(key) { db.ref('todos/' + key).remove(); }
        todoInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTodo(); });

        // ===== TERMINE =====
        function renderTermine() {
            const list = document.getElementById('termineList');
            if (!list) return;
            list.innerHTML = '';
            if (termine.length === 0) { list.innerHTML = '<div class="empty-state">📅 Keine Termine eingetragen</div>'; return; }
            const now = new Date();
            termine.forEach((t) => {
                const div = document.createElement('div');
                const dt = t.when ? new Date(t.when) : null;
                const past = dt && dt < now;
                div.className = 'todo-card' + (past ? ' done' : '');
                const userLabel = t.user === 'raphy' ? '🔥 Raphy' : '💜 Kathi';
                let dateStr = '';
                if (dt) {
                    dateStr = dt.toLocaleString('de-AT', { weekday: 'short', day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
                }
                div.innerHTML = `
                    <div style="display:flex;flex:1;flex-direction:column;">
                        <div class="todo-text">📅 ${t.text}</div>
                        <div style="color:#eaa94e;font-size:13px;margin-top:2px;">${dateStr}</div>
                        <div class="user-info">von ${userLabel}</div>
                    </div>
                    <button class="todo-delete" onclick="deleteTermin('${t._key}')">🗑️</button>
                `;
                list.appendChild(div);
            });
        }

        function addTermin() {
            const text = document.getElementById('termineText').value.trim();
            const when = document.getElementById('termineDate').value;
            if (!text) { showToast('Bitte Termin-Text eingeben!', 'error'); return; }
            if (!when) { showToast('Bitte Datum + Uhrzeit wählen!', 'error'); return; }
            db.ref('termine').push({ text, when, user: currentUser, timestamp: Date.now() });
            document.getElementById('termineText').value = '';
            document.getElementById('termineDate').value = '';
            showToast('✅ Termin gespeichert!', 'success');
        }

        function deleteTermin(key) { db.ref('termine/' + key).remove(); }

        // ===== SIGNALE: Denk an dich / I brauch di / Auf ans =====
        function sendeSignal(type) {
            const now = Date.now();
            db.ref('signale').push({ from: currentUser, type, timestamp: now });
            db.ref('letztesSignal').set({ from: currentUser, type, timestamp: now });
        }
        function denkAnDich() {
            sendeSignal('denk');
            const partner = currentUser === 'raphy' ? '💜 Kathi' : '🔥 Raphy';
            showToast('🧠 ' + partner + ' weiß jetzt, dass du an sie/ihn denkst! 💕', 'success');
        }
        function brauchDi() {
            sendeSignal('brauchdi');
            const partner = currentUser === 'raphy' ? '💜 Kathi' : '🔥 Raphy';
            showToast('🆘 ' + partner + ' kriegt dein Signal - du brauchst sie/ihn!', 'success');
        }
        function aufAns() {
            sendeSignal('aufans');
            const partner = currentUser === 'raphy' ? '💜 Kathi' : '🔥 Raphy';
            showToast('🍻 Anfrage an ' + partner + ' geschickt: Auf ans - kurz?', 'success');
        }

        // Antwort auf eine "Auf ans"-Anfrage (vom Banner aus)
        function aufAnsAntwort(answer) {
            db.ref('aufansAntwort').set({ from: currentUser, to: (currentUser === 'raphy' ? 'kathi' : 'raphy'), answer, timestamp: Date.now() });
            // Signal als erledigt markieren (Banner weg)
            if (lastSignal) dismissedSignal = lastSignal.timestamp;
            document.getElementById('gedankeBanner').style.display = 'none';
            showToast(answer === 'ja' ? '🍻 Zuagsogt! 🎉' : '😅 Abgsogt - vielleicht nächstes Mal', '');
        }

        let dismissedSignal = 0;
        let lastSignal = null;
        function renderGedankeBanner(s) {
            const banner = document.getElementById('gedankeBanner');
            if (!banner || !s || !s.from) { if (banner) banner.style.display = 'none'; return; }
            if (s.from === currentUser) { banner.style.display = 'none'; return; }
            if (s.timestamp <= dismissedSignal) { banner.style.display = 'none'; return; }
            lastSignal = s;
            const fromLabel = s.from === 'raphy' ? '🔥 Raphy' : '💜 Kathi';
            const d = new Date(s.timestamp);
            const heute = new Date().toDateString() === d.toDateString();
            const zeit = heute
                ? 'heute um ' + d.toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit' })
                : 'am ' + d.toLocaleDateString('de-AT', { day: '2-digit', month: '2-digit' }) + ' um ' + d.toLocaleTimeString('de-AT', { hour: '2-digit', minute: '2-digit' });

            let inhalt = '';
            banner.className = 'gedanke-banner';
            if (s.type === 'brauchdi') {
                banner.classList.add('banner-brauchdi');
                inhalt = '🆘 ' + fromLabel + ' braucht dich grad! (' + zeit + ') <span style="opacity:0.6;font-size:12px;">(tippen zum Ausblenden)</span>';
                banner.onclick = dismissGedanke;
            } else if (s.type === 'aufans') {
                banner.classList.add('banner-aufans');
                inhalt = '🍻 ' + fromLabel + ' fragt: Auf ans - kurz? ' +
                    '<button onclick="event.stopPropagation();aufAnsAntwort(\'ja\')" style="margin-left:8px;background:#16a34a;color:#fff;border:none;border-radius:8px;padding:4px 12px;font-weight:700;cursor:pointer;">Ja 🍻</button>' +
                    '<button onclick="event.stopPropagation();aufAnsAntwort(\'nein\')" style="margin-left:6px;background:rgba(255,255,255,0.2);color:#fff;border:none;border-radius:8px;padding:4px 12px;font-weight:700;cursor:pointer;">Na</button>';
                banner.onclick = null;
            } else {
                inhalt = '🧠 ' + fromLabel + ' hat ' + zeit + ' an dich gedacht! <span style="opacity:0.6;font-size:12px;">(tippen zum Ausblenden)</span>';
                banner.onclick = dismissGedanke;
            }
            banner.innerHTML = inhalt;
            banner.style.display = 'flex';
        }

        function dismissGedanke() {
            if (lastSignal) dismissedSignal = lastSignal.timestamp;
            document.getElementById('gedankeBanner').style.display = 'none';
        }

        // ===== ERINNERUNGEN AN DEN ANDEREN =====
        function renderErinnerungen() {
            const list = document.getElementById('erinnerungenList');
            if (!list) return;
            list.innerHTML = '';
            if (erinnerungen.length === 0) { list.innerHTML = '<div class="empty-state">🔔 Keine Erinnerungen</div>'; return; }
            erinnerungen.forEach((e) => {
                const div = document.createElement('div');
                div.className = 'todo-card' + (e.done ? ' done' : '');
                const fromLabel = e.from === 'raphy' ? '🔥 Raphy' : '💜 Kathi';
                const forLabel = e.forUser === 'raphy' ? '🔥 Raphy' : '💜 Kathi';
                div.innerHTML = `
                    <div style="display:flex;flex:1;flex-direction:column;" onclick="toggleErinnerung('${e._key}', ${!e.done})">
                        <div class="todo-text">🔔 ${e.text}</div>
                        <div class="user-info">für ${forLabel} · von ${fromLabel}</div>
                    </div>
                    <button class="todo-delete" onclick="deleteErinnerung('${e._key}')">🗑️</button>
                `;
                list.appendChild(div);
            });
        }
        function addErinnerung() {
            const text = document.getElementById('erinnerungText').value.trim();
            if (!text) { showToast('Bitte Erinnerung eingeben!', 'error'); return; }
            // Erinnerung ist IMMER für den Partner gedacht
            const forUser = currentUser === 'raphy' ? 'kathi' : 'raphy';
            db.ref('erinnerungen').push({ text, from: currentUser, forUser, done: false, timestamp: Date.now() });
            document.getElementById('erinnerungText').value = '';
            const partner = forUser === 'raphy' ? '🔥 Raphy' : '💜 Kathi';
            showToast('🔔 Erinnerung für ' + partner + ' gespeichert!', 'success');
        }
        function toggleErinnerung(key, done) { db.ref('erinnerungen/' + key + '/done').set(done); }
        function deleteErinnerung(key) { db.ref('erinnerungen/' + key).remove(); }
    </script>
</body>
</html>
